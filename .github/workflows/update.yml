name: Update Fabric API data

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Fabric API release tag (e.g. 0.144.0+26.1)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run Twill
        working-directory: core
        run: |
          chmod +x gradlew
          ./gradlew run --args="${{ inputs.tag }}"

      - name: Commit updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metadata/
          git diff --cached --quiet && echo "No metadata changes" || git commit -m "chore: add metadata for ${{ inputs.tag }}"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Copy metadata into dist
        run: cp -r metadata web/dist/metadata

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
